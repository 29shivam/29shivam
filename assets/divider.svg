<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="8" viewBox="0 0 1000 8" fill="none">
  <defs>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="45%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-1 0; 1 0; -1 0" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect x="0" y="3" width="1000" height="2" rx="1" fill="url(#flow)"/>
</svg>
