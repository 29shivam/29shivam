<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated build console showing projects currently in progress">
  <defs>
    <linearGradient id="fill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="glint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset=".5" stop-color="#7dd3fc" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="t2"><rect x="300" y="173" width="330" height="12" rx="6"/></clipPath>
    <clipPath id="t3"><rect x="300" y="217" width="330" height="12" rx="6"/></clipPath>
  </defs>
  <style>
    text   { font-size: 14px; font-family: "SFMono-Regular","JetBrains Mono","Cascadia Code","Roboto Mono",Consolas,monospace; }
    .title { fill: #64748b; font-size: 13px; letter-spacing: .3px; }
    .prompt{ fill: #34d399; }
    .cmd   { fill: #94a3b8; }
    .name  { fill: #22d3ee; font-weight: 600; }
    .done  { fill: #34d399; font-size: 13px; }
    .work  { fill: #94a3b8; font-size: 13px; }
    .line  { opacity: 0; animation: rise .55s cubic-bezier(.22,.61,.36,1) forwards; }
    @keyframes rise { from { opacity: 0; transform: translateY(9px); } to { opacity: 1; transform: translateY(0); } }
    .fill  { transform: scaleX(0); transform-origin: 300px 0; animation: grow 1s ease-out .7s forwards; }
    @keyframes grow { to { transform: scaleX(1); } }
    .sweep { animation: sweep 1.7s linear infinite; }
    @keyframes sweep { from { transform: translateX(-120px); } to { transform: translateX(330px); } }
    .dot   { animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: .25; } }
    .cur   { animation: blink 1.05s steps(1) infinite; }
  </style>

  <rect x="8" y="8" width="804" height="284" rx="13" fill="#0b1020" stroke="#1e293b" stroke-width="1.5"/>
  <path d="M8 21 A13 13 0 0 1 21 8 H799 A13 13 0 0 1 812 21 V50 H8 Z" fill="#111a2e"/>
  <circle cx="32" cy="29" r="6" fill="#ff5f56"/>
  <circle cx="54" cy="29" r="6" fill="#ffbd2e"/>
  <circle cx="76" cy="29" r="6" fill="#27c93f"/>
  <text class="title" x="410" y="33" text-anchor="middle">shivam@dev: ~/building — make all --watch</text>

  <text class="line" x="30" y="92" style="animation-delay:.15s"><tspan class="prompt">$</tspan><tspan class="cmd"> make all --watch</tspan></text>

  <!-- Row 1: system-design-tradeoffs — done -->
  <g class="line" style="animation-delay:.7s">
    <text class="name" x="30" y="140">system-design-tradeoffs</text>
    <rect x="300" y="129" width="330" height="12" rx="6" fill="#152036"/>
    <rect class="fill" x="300" y="129" width="330" height="12" rx="6" fill="url(#fill)"/>
    <text class="done" x="645" y="140">✓ 15 / 15</text>
  </g>

  <!-- Row 2: aphno.ai — building (indeterminate) -->
  <g class="line" style="animation-delay:1.1s">
    <text class="name" x="30" y="184">aphno.ai</text>
    <rect x="300" y="173" width="330" height="12" rx="6" fill="#152036"/>
    <g clip-path="url(#t2)"><rect class="sweep" x="300" y="173" width="120" height="12" fill="url(#glint)"/></g>
    <circle class="dot" cx="639" cy="180" r="3.5" fill="#22d3ee"/>
    <text class="work" x="650" y="184">building…</text>
  </g>

  <!-- Row 3: alpcove — building (indeterminate) -->
  <g class="line" style="animation-delay:1.45s">
    <text class="name" x="30" y="228">alpcove</text>
    <rect x="300" y="217" width="330" height="12" rx="6" fill="#152036"/>
    <g clip-path="url(#t3)"><rect class="sweep" x="300" y="217" width="120" height="12" fill="url(#glint)" style="animation-delay:.85s"/></g>
    <circle class="dot" cx="639" cy="224" r="3.5" fill="#22d3ee" style="animation-delay:.55s"/>
    <text class="work" x="650" y="228">building…</text>
  </g>

  <text class="line" x="30" y="268" style="animation-delay:1.9s"><tspan class="prompt">$</tspan></text>
  <rect class="cur" x="42" y="257" width="9" height="15" rx="1" fill="#22d3ee" style="animation-delay:1.9s"/>
</svg>
