<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="300" viewBox="0 0 1000 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1120"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e2947"/>
    </linearGradient>

    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="45%" stop-color="#c7d2fe"/>
      <stop offset="55%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#818cf8"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-1 0; 1 0; -1 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <radialGradient id="glow" cx="80%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="300" fill="url(#bg)"/>
  <rect width="1000" height="300" fill="url(#glow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- ===== animated distributed-systems graph ===== -->
  <g stroke="#2b3a5e" stroke-width="1.3">
    <line x1="560" y1="70" x2="700" y2="110"/>
    <line x1="560" y1="150" x2="700" y2="110"/>
    <line x1="560" y1="150" x2="700" y2="205"/>
    <line x1="560" y1="230" x2="700" y2="205"/>
    <line x1="700" y1="110" x2="840" y2="150"/>
    <line x1="700" y1="205" x2="840" y2="150"/>
    <line x1="840" y1="150" x2="945" y2="105"/>
    <line x1="840" y1="150" x2="945" y2="200"/>
  </g>

  <!-- flowing data packets -->
  <g fill="#67e8f9" filter="url(#soft)">
    <circle r="3.2">
      <animateMotion dur="2.4s" repeatCount="indefinite" path="M560,70 L700,110 L840,150 L945,105"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.2">
      <animateMotion dur="2.8s" begin="0.6s" repeatCount="indefinite" path="M560,150 L700,110 L840,150 L945,200"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.8s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.2">
      <animateMotion dur="2.6s" begin="1.2s" repeatCount="indefinite" path="M560,230 L700,205 L840,150 L945,105"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.6s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.2">
      <animateMotion dur="3s" begin="0.3s" repeatCount="indefinite" path="M560,150 L700,205 L840,150 L945,200"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="3s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- source / intermediate nodes: gentle pulse -->
  <g fill="#3b4c78">
    <circle cx="560" cy="70" r="4"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="150" r="4"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="230" r="4"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="945" cy="105" r="4"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="945" cy="200" r="4"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="0.8s" repeatCount="indefinite"/></circle>
  </g>
  <g fill="url(#accent)" filter="url(#soft)">
    <circle cx="700" cy="110" r="6"><animate attributeName="r" values="6;7.5;6" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="205" r="6"><animate attributeName="r" values="6;7.5;6" dur="2.4s" begin="0.8s" repeatCount="indefinite"/></circle>
    <!-- hub / "chosen" node -->
    <circle cx="840" cy="150" r="9">
      <animate attributeName="r" values="9;12;9" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="840" cy="150" r="9" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="9;20" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ===== name with sweeping shimmer ===== -->
  <text x="56" y="112" font-family="Menlo, Consolas, monospace" font-size="48" font-weight="700" fill="url(#shimmer)">
    Shivam Singh
  </text>

  <!-- accent underline -->
  <rect x="58" y="126" width="60" height="5" rx="2" fill="url(#accent)"/>

  <!-- tagline (visible by default; motion is enhancement only) -->
  <text x="56" y="170" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#cbd5e1">
    Backend engineer. AWS Certified.
  </text>
  <text x="56" y="198" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#cbd5e1">
    I ship fixes into codebases I don't own —
  </text>
  <text x="56" y="226" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="600" fill="#22d3ee">
    every claim below links to the diff.
  </text>

  <!-- blinking cursor after the punchline -->
  <rect x="366" y="212" width="10" height="18" fill="#22d3ee">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <text x="56" y="264" font-family="Menlo, Consolas, monospace" font-size="14" fill="#64748b">
    Java · Spring Boot · Kafka · PostgreSQL · Redis · AWS · React
  </text>
</svg>
